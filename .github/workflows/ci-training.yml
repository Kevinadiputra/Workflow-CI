name: Model Training and Deployment CI

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/modelling.py'
      - 'MLProject/MLproject'
      - 'MLProject/conda.yaml'
      - 'MLProject/dataset/**'
      - 'Dockerfile'
      - '.github/workflows/ci-training.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4
      with:
        auto-update-conda: true
        python-version: '3.10'
        activate-environment: mlflow-base-env
        conda-remove-defaults: 'true'
        channels: conda-forge

    - name: Install MLflow
      run: |
        conda install -y -c conda-forge mlflow
        pip install conda-repo-cli

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --experiment-name "Heart_Disease_CI"

    # Copy the generated model from the project folder to the root context for Docker packaging
    - name: Copy trained model for serving
      run: |
        cp -r MLProject/model ./model

    # Compress and save MLflow runs as artifacts
    - name: Compress MLflow Runs
      run: |
        tar -czf mlruns.tar.gz mlruns/

    - name: Upload MLflow Runs Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-runs-artifact
        path: mlruns.tar.gz
        retention-days: 30

    # Save model artifacts to the repository itself
    - name: Save model artifacts to repository
      run: |
        mkdir -p saved_artifacts
        cp -r model/* saved_artifacts/
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add saved_artifacts/
        git diff --cached --quiet || git commit -m "ci: save trained model artifacts [skip ci]"
        git push origin main || echo "Push failed, artifacts still available as upload-artifact"

    # Build and Push Docker Image for Serving the Model
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build Docker Image using MLflow models build-docker as required by Kriteria 3 Advance
    - name: Build Docker Image via MLflow
      run: |
        mlflow models build-docker -m model -n ${{ secrets.DOCKER_USERNAME }}/heart-disease-serving:latest

    # Push the built image to Docker Hub
    - name: Push Docker Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/heart-disease-serving:latest
