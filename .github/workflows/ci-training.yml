name: Model Training and Deployment CI

on:
  push:
    branches:
      - main
    paths:
      - 'modelling.py'
      - 'MLproject'
      - 'conda.yaml'
      - 'dataset/**'
      - 'Dockerfile'
      - '.github/workflows/ci-training.yml' # Ensure updates to this file trigger a run
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v4
      with:
        auto-update-conda: true
        python-version: '3.10'
        activate-environment: mlflow-base-env
        conda-remove-defaults: 'true'
        channels: conda-forge

    - name: Install MLflow
      run: |
        conda install -y -c conda-forge mlflow
        pip install conda-repo-cli

    - name: Run MLflow Project
      run: |
        # Run MLflow Project. It will automatically create the environment from conda.yaml
        mlflow run . --experiment-name "Heart_Disease_CI"

    # Compress and save MLflow runs as artifacts
    - name: Compress MLflow Runs
      run: |
        tar -czf mlruns.tar.gz mlruns/

    - name: Upload MLflow Runs Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-runs-artifact
        path: mlruns.tar.gz
        retention-days: 7

    # Build and Push Docker Image for Serving the Model
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/heart-disease-serving:latest
