name: Model Training and Deployment CI

on:
  push:
    branches:
      - main
    paths:
      - 'modelling.py'
      - 'MLproject'
      - 'conda.yaml'
      - 'dataset/**'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas numpy scikit-learn

    - name: Run MLflow Project
      run: |
        # Run MLflow Project using --no-conda to avoid activation bugs in CI
        mlflow run . --no-conda --experiment-name "Heart_Disease_CI"

    # MLflow runs save artifacts to mlruns/. We compress and save them as GitHub artifacts.
    - name: Compress MLflow Runs
      run: |
        tar -czf mlruns.tar.gz mlruns/

    - name: Upload MLflow Runs Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-runs-artifact
        path: mlruns.tar.gz
        retention-days: 7

    # Build and Push Docker Image for Serving the Model
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/heart-disease-serving:latest
